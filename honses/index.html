<script>
    const oneDay = 1000 * 60 * 60 * 24; 

    const seiunSkyDate = new Date("2026-4-2");
    const neoUniverseDate = new Date("2026-11-20");
    const hishiMiracleDate = new Date("2026-12-3");
    const marvelousSundayDate = new Date("2026-12-27");
    const transcendDate = new Date("2027-6-8");
    const riceShowerDate = new Date("2027-8-19");

    document.getElementById("SeiunSkyDays").innerHTML += CalculateDaysLeft(seiunSkyDate) + " days, on " + seiunSkyDate.toLocaleDateString("nl-NL") + ".";
    document.getElementById("NeoUniverseDays").innerHTML += CalculateDaysLeft(neoUniverseDate) + " days, on " + neoUniverseDate.toLocaleDateString("nl-NL") + ".";
    document.getElementById("HishiMiracleDays").innerHTML += CalculateDaysLeft(hishiMiracleDate) + " days, on " + hishiMiracleDate.toLocaleDateString("nl-NL") + ".";
    document.getElementById("MarvelousSundayDays").innerHTML += CalculateDaysLeft(marvelousSundayDate) + " days, on " + marvelousSundayDate.toLocaleDateString("nl-NL") + ".";
    document.getElementById("TranscendDays").innerHTML += CalculateDaysLeft(transcendDate) + " days, on " + transcendDate.toLocaleDateString("nl-NL") + ".";
    document.getElementById("RiceShowerDays").innerHTML += CalculateDaysLeft(riceShowerDate) + " days, on " + riceShowerDate.toLocaleDateString("nl-NL") + ".";

    function CalculateDaysLeft(date)
    {
        return Math.round((date - Date.now()) / oneDay);
    }
</script>
